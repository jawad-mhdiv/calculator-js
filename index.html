<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beautiful Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <div class="calculator">
            <div class="display">
                <input type="text" id="screen" disabled placeholder="0">
            </div>
            
            <div class="keypad">
                <button class="btn operator" data-val="C">C</button>
                <button class="btn operator" data-val="DEL"><i class="fas fa-delete-left"></i></button>
                <button class="btn operator" data-val="/">/</button>
                <button class="btn operator" data-val="*"><i class="fas fa-times"></i></button>

                <button class="btn" data-val="7">7</button>
                <button class="btn" data-val="8">8</button>
                <button class="btn" data-val="9">9</button>
                <button class="btn operator" data-val="-"><i class="fas fa-minus"></i></button>

                <button class="btn" data-val="4">4</button>
                <button class="btn" data-val="5">5</button>
                <button class="btn" data-val="6">6</button>
                <button class="btn operator" data-val="+"><i class="fas fa-plus"></i></button>

                <button class="btn" data-val="1">1</button>
                <button class="btn" data-val="2">2</button>
                <button class="btn" data-val="3">3</button>
                
                <button class="btn equals" data-val="=">=</button>

                <button class="btn zero" data-val="0">0</button>
                <button class="btn" data-val=".">.</button>
            </div>
        </div>

        <div class="developer-credit">Developed by Muhammad Jawad</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
